
module:
  id: test-skill-1
  version: 0.0.1
  languages: [python]
  description: Test skill 1 — one hello capability.
  skills:
    executableSkills:
      - id: hello-cli
        description: Print a greeting to stdout; optional name as first arg after `oxus skills run … --`.
        command: python3
        args: ["./scripts/hello_cli.py"]
        workingDirectory: .
        risk: low
        capability: hello
capabilities:
  - id: hello
    version: 1.0.0
    languages: [python]
    handler: ./src/capabilities/hello.py
    description: Returns a greeting for a name.
    request:
      type: object
      fields:
        name: string
    response:
      type: object
      fields:
        message: string
