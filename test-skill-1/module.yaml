# Standalone payload: copy this folder to a new git repo root and push (see minimal-python-consumer demo script).
module:
  id: minimal-py-provider
  version: 0.0.1
  languages: [python]
  description: Test skill 1 — one hello capability.
capabilities:
  - id: hello
    version: 1.0.0
    languages: [python]
    handler: ./src/capabilities/hello.py
    description: Returns a greeting for a name.
    request:
      type: object
      fields:
        name: string
    response:
      type: object
      fields:
        message: string
